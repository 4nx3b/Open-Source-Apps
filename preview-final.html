<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fix v2 - Tiny X + No Double Sound</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
:root{--bg:#07070a;--text:#efeee9;--text-dim:#9a9aa1;--text-faint:#65656d;--accent:#ffb454;--accent-glow:rgba(255,180,84,.35);--font-display:'Space Grotesk',sans-serif;--font-mono:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font-display);padding:30px 0}
h2{text-align:center}
p.sub{text-align:center;color:var(--text-dim);font-size:13px;margin:8px 0 30px}
</style>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="style-enhanced.css">
</head>
<body>
<h2>v2 - Tiny × only + blur + smooth gradient</h2>
<p class="sub">× is now 10px, no plus. Audio debounced 110ms + touch→mouse suppression. Featured pill gradient loops.</p>
<div class="cat-grid" id="grid"></div>
<script>
const cats=[
  {name:'Featured', count:4, icon:'✦', feat:true},
  {name:'Media', count:9, icon:'♪'},
  {name:'Productivity', count:23, icon:'✓'},
  {name:'Finance', count:4, icon:'$'},
  {name:'Dev Tools', count:3, icon:'◧'},
  {name:'Notes', count:2, icon:'✎'},
  {name:'Utilities', count:5, icon:'⚙'},
  {name:'Communication', count:2, icon:'✉'},
  {name:'Design', count:0, icon:'◐'},
  {name:'Security', count:0, icon:'🔒'},
];
const grid=document.getElementById('grid');
cats.forEach((c,i)=>{
  const b=document.createElement('button');
  b.className='cat-pill'+(c.feat?' cat-pill-featured':'');
  b.style.setProperty('--i',i);
  b.innerHTML=`<span class="cat-ico">${c.icon}</span><span class="cat-pill-body"><span class="cat-name">${c.name}</span></span><span class="cat-count">${c.count}</span>`;
  grid.appendChild(b);
});
</script>
<script src="js/enhanced.js"></script>
</body>
</html>
