<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>v3 - blur like dock + minecraft hit</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
:root{--bg:#07070a;--text:#efeee9;--text-dim:#9a9aa1;--text-faint:#65656d;--accent:#ffb454;--panel-border:rgba(255,255,255,.09);--accent-glow:rgba(255,180,84,.35);--font-display:'Space Grotesk',sans-serif;--font-mono:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font-display);margin:0;padding:28px 0 120px;min-height:100vh}
h2{text-align:center;font-size:22px} p.sub{text-align:center;color:var(--text-dim);font-size:12px;margin:8px auto 26px;max-width:520px;line-height:1.5}
.topbar-demo{max-width:1080px;margin:0 auto 20px;padding:0 16px;display:flex;justify-content:space-between;align-items:center}
.topbar-demo .bar{padding:10px 14px;border-radius:100px;background:rgba(15,15,18,.62);border:1px solid rgba(255,255,255,.09);backdrop-filter:blur(18px);display:flex;gap:8px;align-items:center}
</style>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="style-enhanced.css">
</head><body>
<div class="topbar-demo">
  <div class="bar">Topbar blur reference → <span style="opacity:.6">rgba(15,15,18,.65) + blur 18px</span></div>
</div>
<h2>Blur behind pills = navigation blur</h2>
<p class="sub">Cat grid now has glass panel like dock/topbar: rgba(15,15,18,.62) + blur 18px + 26px radius.<br>Sound = Minecraft hurt (square 340→82Hz + noise thump), same everywhere.</p>
<div class="cat-grid" id="grid"></div>
<script>
const cats=[
  {name:'Featured', count:4, icon:'✦', feat:true, sub:'Handpicked'},
  {name:'Media', count:9, icon:'♪'},
  {name:'Productivity', count:23, icon:'✓'},
  {name:'Finance', count:4, icon:'$'},
  {name:'Dev Tools', count:3, icon:'◧'},
  {name:'Notes', count:2, icon:'✎'},
  {name:'Utilities', count:5, icon:'⚙'},
  {name:'Communication', count:2, icon:'✉'},
  {name:'Design', count:0, icon:'◐'},
  {name:'Security', count:0, icon:'🔒'},
  {name:'Health', count:1, icon:'♥'},
  {name:'Tools', count:23, icon:'🧰'},
  {name:'Music', count:18, icon:'•'},
  {name:'Social', count:4, icon:'•'},
];
const grid=document.getElementById('grid');
cats.forEach((c,i)=>{
  const b=document.createElement('button');
  b.className='cat-pill'+(c.feat?' cat-pill-featured':'');
  b.style.setProperty('--i',i);
  b.innerHTML=`<span class="cat-ico">${c.icon}</span><span class="cat-pill-body"><span class="cat-name">${c.name}</span>${c.sub?`<span class="cat-sub">${c.sub}</span>`:''}</span><span class="cat-count">${c.count}</span>`;
  grid.appendChild(b);
});
</script>
<script src="js/enhanced.js"></script>
</body></html>
